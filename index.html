<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Love Match v2</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #fff0f5; font-family: 'Poppins', sans-serif; text-align: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #ff4d6d; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        button { background: #ff4d6d; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #ff758f; }
        .note { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>❤️ Love Match v2 ❤️</h2>
        <form action="results.html" method="GET">
            <input type="text" name="boyName" placeholder="His Name" required>
            <input type="text" name="boyImg" placeholder="His Photo Link (URL)" required>
            <hr>
            <input type="text" name="girlName" placeholder="Her Name" required>
            <input type="text" name="girlImg" placeholder="Her Photo Link (URL)" required>
            
            <button type="submit">Check Match ✨</button>
        </form>
        <p class="note">*ඔයාගේ ෆොටෝ එකක Link එකක් ගන්න PostImages.org වගේ සයිට් එකක් පාවිච්චි කරන්න.</p>
    </div>
</body>
</html>
