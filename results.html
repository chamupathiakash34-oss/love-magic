<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Perfect Match!</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <style>
        body { background: #ffdee9; background-image: linear-gradient(0deg, #ffdee9 0%, #b5fffc 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; margin: 0; }
        .result-box { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.2); text-align: center; width: 90%; max-width: 500px; animation: popIn 1s ease-out; }
        
        .photo-container { display: flex; justify-content: space-around; align-items: center; margin: 20px 0; position: relative; }
        .profile-pic { width: 100px; height: 100px; border-radius: 50%; border: 4px solid #ff4d6d; object-fit: cover; animation: bounce 2s infinite; }
        .main-heart { font-size: 50px; color: #ff4d6d; animation: heartbeat 1s infinite; }
        
        h1 { font-family: 'Pacifico', cursive; color: #ff4d6d; font-size: 35px; margin: 10px 0; }
        .names { font-size: 20px; font-weight: bold; color: #333; }
        
        @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes heartbeat { 0% { transform: scale(1); } 50% { transform: scale(1.3); } 100% { transform: scale(1); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>
<body>
    <div class="result-box">
        <h1>Perfect Match!</h1>
        
        <div class="photo-container">
            <div>
                <img id="bImg" class="profile-pic" src="" alt="Boy">
                <div id="bName" class="names"></div>
            </div>
            
            <div class="main-heart">❤️</div>
            
            <div>
                <img id="gImg" class="profile-pic" src="" alt="Girl">
                <div id="gName" class="names"></div>
            </div>
        </div>
        
        <p>Congratulations! You both look amazing together. ✨</p>
    </div>

    <script>
        // URL එකෙන් දත්ත කියවා ගැනීම
        const params = new URLSearchParams(window.location.search);
        document.getElementById('bName').innerText = params.get('boyName');
        document.getElementById('gName').innerText = params.get('girlName');
        document.getElementById('bImg').src = params.get('boyImg');
        document.getElementById('gImg').src = params.get('girlImg');
    </script>
</body>
</html>
