<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Perfect Match!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        body { background-color: #ffcccc; text-align: center; font-family: 'Poppins', sans-serif; padding-top: 50px; overflow: hidden; margin: 0; }
        
        .box { border: 2px solid #ff0000; padding: 30px 15px; border-radius: 20px; display: inline-block; background: white; width: 85%; max-width: 360px; box-shadow: 0 8px 30px rgba(255, 0, 0, 0.3); position: relative; animation: fadeIn 1s ease-out; overflow: hidden; }
        
        /* අකුරු කොටුවෙන් පිටතට යාම වැළැක්වීමට මෙතන වෙනස් කළා */
        h1 { color: #ff0000; font-size: 28px; margin: 10px 0; text-transform: uppercase; letter-spacing: 1px; animation: zoomIn 1s ease-out; word-wrap: break-word; }
        
        /* You are a Perfect Match එක ලස්සන Font එකකින් */
        h2 { font-family: 'Pacifico', cursive; color: #ff4d4d; font-size: 24px; margin-bottom: 20px; animation: zoomIn 1.5s ease-out; }
        
        p { color: #555; font-size: 16px; line-height: 1.5; margin-bottom: 10px; animation: fadeIn 2s ease-out; }
        
        .hearts-container { font-size: 50px; margin: 15px 0; display: flex; justify-content: center; gap: 10px; }
        .heart { display: inline-block; animation: heartBeat 1.5s ease-in-out infinite, rotateHeart 3s linear infinite; color: red; }
        .heart:nth-child(2) { animation-delay: 0.5s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes zoomIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        @keyframes rotateHeart { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .floating-heart { position: absolute; color: rgba(255, 0, 0, 0.3); font-size: 20px; animation: floatUp 4s linear infinite; opacity: 0; z-index: -1; }
        @keyframes floatUp { 0% { transform: translateY(100%) rotate(0deg); opacity: 1; } 100% { transform: translateY(-500px) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>
    <div class="box">
        <div class="floating-heart" style="left: 10%; animation-delay: 0s;">&#x2764;</div>
        <div class="floating-heart" style="left: 40%; animation-delay: 1.5s;">&#x2764;</div>
        <div class="floating-heart" style="left: 80%; animation-delay: 3s;">&#x2764;</div>

        <h1>Congratulations!</h1>
        
        <div class="hearts-container">
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
            <span class="heart">❤️</span>
        </div>

        <h2>You are a Perfect Match!</h2>
        <p>Good luck!</p>
        <p style="font-weight: bold; color: #ff4d4d;">ඔබේ ප්‍රතිඵලය සාර්ථකව ගණනය කරන ලදී.</p>
        <div style="font-size: 25px;">💖 ✨ 💖</div>
    </div>
</body>
</html>
